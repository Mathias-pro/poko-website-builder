ctxCssImport:
  filename: ctx.css
inlineAllStyles: true
widthsContexts:
  - name: main
    max: 80rem
    prose: 50rem
fontStacksContexts:
  - name: main
    body:
      native: handwritten
      custom: Roboto
    heading:
      native: rounded-sans
      custom: Bitter
    code:
      native: monospace-code
      custom: ''
customFontsImport:
  - name: Pacifico
    source:
      type: fontsource
      name: Pacifico
      weights:
        - '400'
      styles:
        - normal
      subsets:
        - latin
  - name: Roboto
    source:
      type: fontsource
      name: Roboto
      weights:
        - '400'
      styles:
        - normal
      subsets:
        - latin
  - name: Bitter
    source:
      type: fontsource
      name: Bitter
      weights:
        - '400'
      styles:
        - normal
      subsets:
        - latin
typeScales:
  - name: main
    minFontSize: 16
    maxFontSize: 20
    minTypeScale: 1.2
    maxTypeScale: 1.25
colors:
  - name: fond-vert
    value: '#073300'
  - name: noir
    value: '#000000'
  - name: blanc
    value: '#ffffff'
  - name: texte-bleu-mat
    value: '#c4d9f2'
palettes:
  - name: Nature
    text: texte-bleu-mat
    bg: fond-vert
    accent: bleu-ciel-3D9DF2
    border: bleu-ciel-3D9DF2
    text-decoration: bleu-ciel-3D9DF2
    text--marker: bleu-ciel-3D9DF2
    advancedDefaults: null
    selection: null
    strong: null
    em: null
    mark: null
    b: null
    heading: null
    a: null
    button: null
    code: null
    svg: null
    scrollbar: null
    advanced: null
  - name: informatique
    text: bleu-claire-05C7F2
    bg: bleu-fonce-025373
    accent: ''
    border: ''
    text-decoration: ''
    text--marker: ''
    advancedDefaults: null
    selection: null
    strong: null
    em: null
    mark: null
    b: null
    heading: null
    a: null
    button: null
    code: null
    svg: null
    scrollbar: null
    advanced: null
styleContexts:
  - name: main
    value: ctx
