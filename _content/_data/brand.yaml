ctxCssImport:
  filename: ctx.css
inlineAllStyles: true
widthsContexts:
  - name: main
    max: 80rem
    prose: 50rem
fontStacksContexts:
  - name: main
    body:
      native: handwritten
      custom: ''
    heading:
      native: rounded-sans
      custom: Pacifico
    code:
      native: monospace-code
      custom: ''
customFontsImport:
  - name: Pacifico
    source:
      type: fontsource
      name: Pacifico
      weights:
        - '400'
      styles:
        - normal
      subsets:
        - latin
typeScales:
  - name: main
    minFontSize: 18
    maxFontSize: 20
    minTypeScale: 1.2
    maxTypeScale: 1.25
colors:
  - name: bleu-fonce-025373
    value: '#025373'
  - name: jaune-BFB304
    value: '#bfb304'
  - name: bleu-claire-05C7F2
    value: '#05c7f2'
palettes:
  - name: informatique
    text: bleu-claire-05C7F2
    bg: bleu-fonce-025373
    accent: ''
    border: ''
    text-decoration: ''
    text--marker: ''
    advancedDefaults: null
    selection: null
    strong: null
    em: null
    mark: null
    b: null
    heading: null
    a: null
    button: null
    code: null
    svg: null
    scrollbar: null
    advanced: null
styleContexts:
  - name: main
    value: ctx
