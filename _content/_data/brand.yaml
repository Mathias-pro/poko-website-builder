ctxCssImport:
  filename: ctx.css
inlineAllStyles: true
widthsContexts:
  - name: main
    max: 80rem
    prose: 50rem
fontStacksContexts:
  - name: main
    body:
      native: handwritten
      custom: ''
    heading:
      native: rounded-sans
      custom: Pacifico
    code:
      native: monospace-code
      custom: ''
customFontsImport:
  - name: Pacifico
    source:
      type: fontsource
      name: Pacifico
      weights:
        - '400'
      styles:
        - normal
      subsets:
        - latin
